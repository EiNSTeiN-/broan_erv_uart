external_components:
  - source:
      type: git
      url: https://github.com/nspitko/broan_erv_uart
      ref: main
    components: [ broan ]

uart:
  - id: hrv_rs485
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 38400
    rx_buffer_size: 2048

  - id: remote_rs485
    tx_pin: GPIO25
    rx_pin: GPIO26
    baud_rate: 38400
    rx_buffer_size: 2048

broan:
  id: mybroan
  uart_id: hrv_rs485
  remote_uart_id: remote_rs485
  # Use the confirmed client address printed by uart_diagnostic success if it differs.
  # client_address: 0x01
  # Set these only if your RS485 transceivers need manual driver enable.
  # flow_control_pin: GPIO21
  # remote_flow_control_pin: GPIO22

select:
  - platform: broan
    fan_mode:
      name: "Fan Mode"

number:
  - platform: broan
    target_supply_cfm_min:
      name: "Target Supply CFM Min"
    target_exhaust_cfm_min:
      name: "Target Exhaust CFM Min"
    target_supply_cfm_medium:
      name: "Target Supply CFM Medium"
    target_exhaust_cfm_medium:
      name: "Target Exhaust CFM Medium"
    target_supply_cfm_max:
      name: "Target Supply CFM Max"
    target_exhaust_cfm_max:
      name: "Target Exhaust CFM Max"

sensor:
  - platform: broan
    power:
      name: "Power Draw"
    temperature:
      name: "Temperature"
    filter_life:
      name: "Remaining Filter Life"

button:
  - platform: broan
    filter_reset:
      name: "Filter Reset"
